[env]
TERM = "xterm-256color"

[window]
opacity = 0.8

[font]
size = 14.0

[font.bold]
family = "Blex Mono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Blex Mono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Blex Mono Nerd Font"
style = "Italic"

[font.normal]
family = "Blex Mono Nerd Font"
style = "Regular"
