#### COLOUR (VS Code Dark+)

# default statusbar colors
set-option -g status-style bg=#1e1e1e,fg=#d4d4d4,default

# default window title colors
set-window-option -g window-status-style fg=#858585,bg=#1E1E1E,dim

# active window title colors
set-window-option -g window-status-current-style fg=#569cd6,bg=default,bright

# pane border
set-option -g pane-border-style fg=#3c3c3c
set-option -g pane-active-border-style fg=#569cd6,bg=#1e1e1e

# message text
set-option -g message-style bg=#1e1e1e,fg=#4ec9b0

# pane number display
set-option -g display-panes-active-colour "#9cdcfe" #light blue
set-option -g display-panes-colour "#f44747" #red

# clock
set-window-option -g clock-mode-colour "#ce9178" #orange
