set -g mode-style "fg=#839496,bg=#073642"

set -g message-style "fg=#839496,bg=#073642"
set -g message-command-style "fg=#839496,bg=#073642"

set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#002b36"

set -g status-bg "#002b36"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-right "#[fg=#2aa198,bg=#002b36,nobold,nounderscore,noitalics]#[fg=#002b36,bg=#2aa198,bold] donghia "
set -g status-left "#[fg=#002b36,bg=#268bd2,bold] #S #[fg=#268bd2,bg=#002b36]"

setw -g window-status-activity-style "underscore,fg=#839496,bg=#002b36"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#586e75,bg=#002b36"
setw -g window-status-format '#[fg=#002b36,bg=#002b36]#[default] #I  #W #[fg=#002b36,bg=#002b36,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#002b36,bg=#073642]#[fg=#839496,bg=#073642,bold] #I #[fg=#073642,bg=#268bd2] #W #[fg=#268bd2,bg=#002b36,nobold]'
