#### COLOUR (Solarized Dark)

# Core styles
set -g mode-style "fg=#93a1a1,bg=#073642"
set -g message-style "fg=#93a1a1,bg=#073642"
set -g message-command-style "fg=#93a1a1,bg=#073642"

# Pane borders
set -g pane-border-style "fg=#586e75"
set -g pane-active-border-style "fg=#268bd2"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#839496,bg=#073642"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

# Panes and clock
set -g display-panes-active-colour "#2aa198"
set -g display-panes-colour "#dc322f"
setw -g clock-mode-colour "#268bd2"

# Left/right sections
set -g status-right "#[fg=#2aa198,bg=#073642,nobold,nounderscore,noitalics]#[fg=#073642,bg=#2aa198,bold] donghia "
set -g status-left "#[fg=#073642,bg=#268bd2,bold] #S #[fg=#268bd2,bg=#073642]"

# Windows
setw -g window-status-activity-style "underscore,fg=#93a1a1,bg=#073642"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#93a1a1,bg=#073642"
setw -g window-status-format '#[fg=#073642,bg=#073642]#[default] #I  #W #[fg=#073642,bg=#073642,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#073642,bg=#002b36]#[fg=#6c71c4,bg=#002b36] #I #[fg=#002b36,bg=#6c71c4] #W #[fg=#6c71c4,bg=#073642,nobold]'
