#### COLOUR (one-for-all — jdonghia.github.io palette)

# Core styles
set -g mode-style "fg=#1b1b1b,bg=#40bebd"
set -g message-style "fg=#fafafa,bg=#2c2c2c"
set -g message-command-style "fg=#fafafa,bg=#2c2c2c"

# Pane borders
set -g pane-border-style "fg=#2c2c2c"
set -g pane-active-border-style "fg=#40bebd"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#abacaf,bg=#1b1b1b"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

# Panes and clock
set -g display-panes-active-colour "#40bebd"
set -g display-panes-colour "#db324d"
setw -g clock-mode-colour "#40bebd"

# Left/right sections
set -g status-right "#[fg=#40bebd,bg=#1b1b1b,nobold,nounderscore,noitalics]#[fg=#1b1b1b,bg=#40bebd,bold] donghia "
set -g status-left "#[fg=#1b1b1b,bg=#40bebd,bold] #S #[fg=#40bebd,bg=#1b1b1b]"

# Windows
setw -g window-status-activity-style "underscore,fg=#ada159,bg=#1b1b1b"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#777777,bg=#1b1b1b"
setw -g window-status-format '#[fg=#1b1b1b,bg=#1b1b1b]#[default] #I  #W #[fg=#1b1b1b,bg=#1b1b1b,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1b1b1b,bg=#2c2c2c]#[fg=#40bebd,bg=#2c2c2c] #I #[fg=#2c2c2c,bg=#40bebd] #W #[fg=#40bebd,bg=#1b1b1b,nobold]'
