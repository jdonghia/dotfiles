bind-key j select-pane -D
bind-key h select-pane -L
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r g run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key -r H switch-client -t '$0'
bind-key -r J switch-client -t '$1'
bind-key -r K switch-client -t '$2'
bind-key -r L switch-client -t '$3'

setw -g mode-keys vi

set -g default-terminal "tmux-256color"
# set -g base-index 1
set -g detach-on-destroy off

set -ag terminal-overrides ",xterm-256color:RGB"

set-option -g status-position top
set-option -g mouse on

# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'omerxx/tmux-sessionx'

source ~/one-for-all.conf

