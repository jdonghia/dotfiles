bind-key j select-pane -D
bind-key h select-pane -L
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r g run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Jump to tmux sessions by numeric session_id ($0-$3)
bind-key 9 switch-client -t '$0'
bind-key 8 switch-client -t '$1'
bind-key 7 switch-client -t '$2'

setw -g mode-keys vi

set-option -g status-position top

set-option -g mouse on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

source ~/theme.conf
source ~/statusline.conf
