#### COLOUR (Rose Pine Moon)

# Core styles
set -g mode-style "fg=#e0def4,bg=#232136"
set -g message-style "fg=#e0def4,bg=#232136"
set -g message-command-style "fg=#e0def4,bg=#232136"

# Pane borders
set -g pane-border-style "fg=#403d52"
set -g pane-active-border-style "fg=#9ccfd8"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#908caa,bg=#2a273f"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

# Panes and clock
set -g display-panes-active-colour "#9ccfd8"
set -g display-panes-colour "#eb6f92"
setw -g clock-mode-colour "#9ccfd8"

# Left/right sections
set -g status-right "#[fg=#9ccfd8,bg=#2a273f,nobold,nounderscore,noitalics]#[fg=#2a273f,bg=#9ccfd8,bold] donghia "
set -g status-left "#[fg=#2a273f,bg=#31748f,bold] #S #[fg=#31748f,bg=#2a273f]"

# Windows
setw -g window-status-activity-style "underscore,fg=#e0def4,bg=#2a273f"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#e0def4,bg=#2a273f"
setw -g window-status-format '#[fg=#2a273f,bg=#2a273f]#[default] #I  #W #[fg=#2a273f,bg=#2a273f,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#2a273f,bg=#393552]#[fg=#c4a7e7,bg=#393552] #I #[fg=#393552,bg=#c4a7e7] #W #[fg=#c4a7e7,bg=#2a273f,nobold]'
