#### COLOUR (Solarized Dark)

# default statusbar colors
set-option -g status-style bg=#002b36,fg=#839496,default

# default window title colors
set-window-option -g window-status-style fg=#586e75,bg=#002b36,dim

# active window title colors
set-window-option -g window-status-current-style fg=#268bd2,bg=default,bright

# pane border
set-option -g pane-border-style fg=#073642
set-option -g pane-active-border-style fg=#268bd2,bg=#002b36

# message text
set-option -g message-style bg=#073642,fg=#2aa198

# pane number display
set-option -g display-panes-active-colour "#2aa198" #cyan
set-option -g display-panes-colour "#dc322f" #red

# clock
set-window-option -g clock-mode-colour "#b58900" #yellow
