set -g mode-style "fg=#d4d4d4,bg=#1e1e1e"

set -g message-style "fg=#d4d4d4,bg=#1e1e1e"
set -g message-command-style "fg=#d4d4d4,bg=#1e1e1e"

set -g pane-border-style "fg=#3c3c3c"
set -g pane-active-border-style "fg=#569cd6"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#858585,bg=#1e1e1e"

set -g status-bg "#1e1e1e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-right "#[fg=#9cdcfe,bg=#1e1e1e,nobold,nounderscore,noitalics]#[fg=#1e1e1e,bg=#9cdcfe,bold] donghia "
set -g status-left "#[fg=#1e1e1e,bg=#569cd6,bold] #S #[fg=#569cd6,bg=#1e1e1e]"

setw -g window-status-activity-style "underscore,fg=#d4d4d4,bg=#1e1e1e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#d4d4d4,bg=#1e1e1e"
setw -g window-status-format '#[fg=#1e1e1e,bg=#1e1e1e]#[default] #I  #W #[fg=#1e1e1e,bg=#1e1e1e,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1e1e1e,bg=#d4d4d4]#[fg=#1e1e1e,bg=#d4d4d4,bold] #I #[fg=#d4d4d4,bg=#569cd6] #W #[fg=#569cd6,bg=#1e1e1e,nobold]'
